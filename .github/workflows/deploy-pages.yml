name: Deploy Blazor PWA to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore RaidLoop.sln

      - name: Test
        run: dotnet test tests/RaidLoop.Core.Tests/RaidLoop.Core.Tests.csproj --configuration Release --verbosity minimal

      - name: Publish Client
        run: dotnet publish src/RaidLoop.Client/RaidLoop.Client.csproj -c Release -o publish

      - name: Configure GitHub Pages Base Path
        shell: pwsh
        run: |
          $site = Join-Path $PWD 'publish/wwwroot'
          $repo = '${{ github.event.repository.name }}'
          $index = Join-Path $site 'index.html'
          $content = Get-Content $index -Raw
          $baseHref = '<base href="/{0}/" />' -f $repo
          $content = $content -replace '<base href="/" />', $baseHref
          Set-Content $index $content
          Copy-Item $index (Join-Path $site '404.html') -Force

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
