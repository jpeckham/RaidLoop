name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-coverage:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore RaidLoop.sln

      - name: Test with coverage
        run: |
          dotnet test tests/RaidLoop.Core.Tests/RaidLoop.Core.Tests.csproj \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults

      - name: Install report generator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report and badge
        run: |
          ls -R TestResults
          reportgenerator \
            "-reports:TestResults/**/coverage.cobertura.xml" \
            "-targetdir:coveragereport" \
            "-reporttypes:Html;MarkdownSummaryGithub;Badges"

      - name: Publish coverage summary
        shell: bash
        run: |
          set -euo pipefail
          if [ -f coveragereport/SummaryGithub.md ]; then
            cat coveragereport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ -f coveragereport/Summary.md ]; then
            cat coveragereport/Summary.md >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "Coverage summary file not found. Generated files:" >&2
          find coveragereport -maxdepth 2 -type f | sort >&2
          exit 1

      - name: Update coverage badge file
        run: |
          mkdir -p .github/badges
          cp coveragereport/badge_linecoverage.svg .github/badges/coverage.svg

      - name: Commit coverage badge (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- .github/badges/coverage.svg; then
            echo "No badge changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.svg
          git commit -m "chore: update coverage badge [skip ci]"
          git push

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coveragereport
